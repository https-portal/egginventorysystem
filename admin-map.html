<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggDash | Delivery Map</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --sidebar: #1e293b;
            --background: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Navigation (Uniform) --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fbbf24;
        }

        .nav-link {
            padding: 12px 15px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: var(--primary); color: white; }

        .logout-btn {
            margin-top: auto;
            background: #334155;
            border: none;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- Map Container --- */
        .main-content {
            flex: 1;
            position: relative;
            background: var(--background);
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        
        .map-header h1 { margin: 0; font-size: 1.2rem; color: var(--sidebar); }
    </style>
</head>
<body>
<nav class="sidebar">
    <h2><i class="fas fa-egg"></i>Bakaka Poultry Farm</h2>
    
    <a href="admin-dashboard.html" class="nav-link">
        <i class="fas fa-th-large"></i> Dashboard
    </a>

    <a href="inventory.html" class="nav-link active">
        <i class="fas fa-boxes-stacked"></i> View Inventory
    </a>

    <a href="sales-report.html" class="nav-link">
        <i class="fas fa-file-invoice-dollar"></i> Sales Report
    </a>
    
    <a href="admin-calendar.html" class="nav-link">
        <i class="fas fa-calendar-alt"></i> Delivery Calendar
    </a>
    
    <a href="production.html" class="nav-link">
        <i class="fas fa-plus-circle"></i> Add Production
    </a>
    
    <a href="admin-map.html" class="nav-link">
        <i class="fas fa-map-marked-alt"></i> Delivery Map
    </a>

    <a href="production_report.html" class="nav-link">
        <i class="fas fa-file-contract"></i> Production Report
    </a>
    
    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</nav>

    <div class="main-content">
        <div class="map-header">
            <h1><i class="fas fa-truck"></i> Live Delivery Map</h1>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const firebaseConfig={
            apiKey:"AIzaSyABsyqTPCwlTuC7WLBmtXo7HgZjfxRHU7M",
            authDomain:"egg-inventory-system-10c0b.firebaseapp.com",
            databaseURL:"https://egg-inventory-system-10c0b-default-rtdb.firebaseio.com",
            projectId:"egg-inventory-system-10c0b"
        };
        firebase.initializeApp(firebaseConfig);
        const db=firebase.database();

        // Initialize Map
        const map=L.map('map').setView([10.3157,123.8854], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Load Locations
        db.ref("reservation").on("value", snapshot => {
            if(!snapshot.exists()) return;
            
            // Clear existing markers if necessary (optional depending on your needs)
            const data=snapshot.val();
            for(const date in data){
                for(const time in data[date]){
                    for(const uid in data[date][time]){
                        const r=data[date][time][uid];
                        if(r.location && r.status === "Approved"){
                            const marker = L.marker([r.location.lat, r.location.lng]).addTo(map);
                            
                            // Professional Popup Design
                            const popupContent = `
                                <div style="font-family: 'Inter', sans-serif;">
                                    <strong style="color: #4f46e5;">${r.name}</strong><br>
                                    <small>${r.contact || 'No Contact'}</small><hr>
                                    <b>Orders:</b> ${r.trays} Trays (${r.size})<br>
                                    <b>Delivery:</b> ${r.delivery_status || 'Pending'}
                                </div>
                            `;
                            marker.bindPopup(popupContent);
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
