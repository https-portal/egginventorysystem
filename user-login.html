<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login | EggDash</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root {
    --user-primary: #3b82f6;
    --user-secondary: #0ea5e9;
    --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
    --card-bg: rgba(255, 255, 255, 0.9);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-gradient);
    padding: 20px;
}

.login-card {
    width: 100%;
    max-width: 400px;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
    animation: slideUp 0.6s ease;
}

.profile-circle {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--user-primary), var(--user-secondary));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    color: white;
    margin: 0 auto 20px;
    box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);
}

h2 {
    color: #1e293b;
    font-weight: 700;
    font-size: 1.8rem;
    margin-bottom: 10px;
}

.subtitle {
    color: #64748b;
    font-size: 0.95rem;
    margin-bottom: 30px;
}

.input-group {
    margin-bottom: 20px;
    text-align: left;
}

.input-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 8px;
    margin-left: 4px;
}

.input-field {
    position: relative;
    display: flex;
    align-items: center;
}

.input-field i {
    position: absolute;
    left: 15px;
    color: #94a3b8;
    transition: 0.3s;
}

.input-field input {
    width: 100%;
    padding: 14px 15px 14px 45px;
    border: 2px solid #f1f5f9;
    border-radius: 12px;
    outline: none;
    font-size: 0.95rem;
    transition: all 0.3s;
    background: #f8fafc;
}

.input-field input:focus {
    border-color: var(--user-primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}

.input-field input:focus + i {
    color: var(--user-primary);
}

.show-hide {
    position: absolute;
    right: 15px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--user-primary);
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--user-primary), var(--user-secondary));
    color: white;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    filter: brightness(1.1);
}

.signup-link {
    margin-top: 25px;
    font-size: 0.9rem;
    color: #64748b;
}

.signup-link a {
    color: var(--user-primary);
    text-decoration: none;
    font-weight: 700;
}

.error-msg {
    margin-top: 15px;
    color: #ef4444;
    font-size: 0.85rem;
    background: #fef2f2;
    padding: 10px;
    border-radius: 8px;
    display: none;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 400px) {
    .login-card { padding: 30px 20px; }
}
</style>
</head>

<body>

<div class="login-card">
    <div class="profile-circle">
        <i class="fas fa-user"></i>
    </div>

    <h2>Welcome Back!</h2>
    <p class="subtitle">Log in to manage your egg orders</p>

    <div class="input-group">
        <label>Email Address</label>
        <div class="input-field">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Enter Email">
        </div>
    </div>

    <div class="input-group">
        <label>Password</label>
        <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter Password">
            <span class="show-hide" onclick="togglePassword()" id="toggleText">Show</span>
        </div>
    </div>

    <button onclick="login()">Log In</button>

    <div class="error-msg" id="error"></div>

    <div class="signup-link">
        Don't have an account? <a href="signup.html">Create Account</a>
    </div>

    <div style="margin-top: 20px; font-size: 11px; color: #94a3b8; letter-spacing: 0.5px;">
        EGG DASH INVENTORY SYSTEM
    </div>
</div>

<script>
// Firebase Config (Kopyaha ang imong original config diri)
const firebaseConfig = {
  apiKey: "AIzaSyABsyqTPCwlTuC7WLBmtXo7HgZjfxRHU7M",
  authDomain: "egg-inventory-system-10c0b.firebaseapp.com",
  databaseURL: "https://egg-inventory-system-10c0b-default-rtdb.firebaseio.com",
  projectId: "egg-inventory-system-10c0b",
  storageBucket: "egg-inventory-system-10c0b.appspot.com",
  messagingSenderId: "935350302045",
  appId: "1:935350302045:web:96ff5e551cdea5b120e4b4",
  measurementId: "G-R5ZEYKVXZN"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

function togglePassword(){
    let pass = document.getElementById("password");
    let text = document.getElementById("toggleText");
    if(pass.type === "password"){
        pass.type = "text";
        text.innerText = "Hide";
    } else {
        pass.type = "password";
        text.innerText = "Show";
    }
}

function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const error = document.getElementById("error");

    error.style.display = "none";

    if(email === "" || password === ""){
        error.innerText = "⚠️ Please fill all fields";
        error.style.display = "block";
        return;
    }

    auth.signInWithEmailAndPassword(email,password)
    .then((userCredential)=>{
        const uid = userCredential.user.uid;
        database.ref('user/' + uid).get().then((snapshot)=>{
            if(snapshot.exists()){
                const userData = snapshot.val();
                if(userData.usertype === "user"){
                    window.location = "index.html";
                } else {
                    error.innerText = "❌ Access denied: Admin account detected.";
                    error.style.display = "block";
                    auth.signOut();
                }
            } else {
                error.innerText = "❓ No account found in database.";
                error.style.display = "block";
                auth.signOut();
            }
        });
    })
    .catch((err)=>{
        error.innerText = "🚫 " + err.message;
        error.style.display = "block";
    });
}
</script>

</body>
</html>
