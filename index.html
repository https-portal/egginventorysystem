<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakafa| Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" type="image/png" href="tag.png">
    <style>
        :root {
            --primary: #fbbf24; /* Egg Yellow */
            --primary-dark: #d97706;
            --sidebar: #1e293b;
            --background: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Fullscreen Background --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Mogamit sa imong logo.png as background, center and cover */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('logo.png');
            background-size: cover;
            background-position: center;
            filter: blur(3px);
            transform: scale(1.1);
        }

        /* --- Loading Bar Container --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .loader-logo {
            width: 100px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        .progress-container {
            width: 250px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.1s linear;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- Main Content Hero --- */
        .hero {
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .hero.show {
            opacity: 1;
            transform: translateY(0);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #cbd5e1;
        }

        .reserve-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary);
            color: var(--sidebar);
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3);
        }

        .reserve-btn:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .hero h1 { font-size: 2rem; }
            .reserve-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <img src="logo.png" alt="Logo" class="loader-logo">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p style="color: white; margin-top: 15px; font-size: 0.8rem; letter-spacing: 2px;">LOADING...</p>
    </div>

    <div class="bg-container"></div>

    <div class="hero" id="hero-content">
        <h1>Fresh Harvest, Just a Tap Away.</h1>
        <p>Reliable and farm-fresh egg supply for your home and business.</p>
        
        <a href="reservation.html" class="reserve-btn">
            Reserve Now <i class="fas fa-arrow-right"></i>
        </a>
    </div>

    <script>
        // Loading Logic
        window.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const loaderWrapper = document.getElementById('loader-wrapper');
            const heroContent = document.getElementById('hero-content');
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    
                    // Hide loader
                    loaderWrapper.style.opacity = '0';
                    setTimeout(() => {
                        loaderWrapper.style.visibility = 'hidden';
                        // Show content
                        heroContent.classList.add('show');
                    }, 500);
                } else {
                    width += 2; // Speed of loading
                    progressBar.style.width = width + '%';
                }
            }, 30); // 30ms * 50 steps = approx 1.5 seconds loading
        });
    </script>
</body>

</html>
