<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggDash | Delivery Calendar</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

    <style>
        :root {
            --primary: #4f46e5;
            --sidebar: #1e293b;
            --background: #f8fafc;
            --secondary: #64748b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--background); margin: 0; display: flex; min-height: 100vh; }

        /* --- Sidebar Navigation (Uniform Design) --- */
        .sidebar {
            width: 260px; background: var(--sidebar); color: white; padding: 2rem 1rem;
            display: flex; flex-direction: column; position: fixed; height: 100vh;
            left: 0; transition: transform 0.3s ease; z-index: 1001; box-sizing: border-box; 
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }

        .sidebar h2 { font-size: 1.25rem; margin-bottom: 2rem; color: #fbbf24; display: flex; align-items: center; gap: 10px; }
        
        .nav-link {
            padding: 12px 15px; color: #cbd5e1; text-decoration: none; border-radius: 8px;
            margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }

        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }

        .logout-btn {
            margin-top: auto; background: #334155; border: none; color: #fca5a5;
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 10px;
        }

        /* --- Main Content --- */
        .main-content { flex: 1; margin-left: 260px; padding: 1.5rem; width: 100%; box-sizing: border-box; transition: 0.3s; }

        @media (max-width: 768px) {
            .main-content { margin-left: 0; padding: 1rem; }
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .mobile-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--sidebar); }
        @media (max-width: 768px) { .mobile-toggle { display: block; } }

        /* --- Calendar Container --- */
        .calendar-container {
            background: white; padding: 1rem; border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* FullCalendar Customization for Mobile */
        .fc { max-width: 100%; font-size: 0.85rem; }
        .fc-toolbar { flex-wrap: wrap; gap: 10px; }
        @media (max-width: 500px) {
            .fc-toolbar-title { font-size: 1rem !important; }
            .fc-button { padding: 4px 8px !important; font-size: 0.75rem !important; }
        }

        /* Sidebar Overlay */
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
        }
        .sidebar-overlay.active { display: block; }


        .admin-profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.admin-profile i{
font-size:30px;
color:#fbbf24;
}

.admin-label{
font-size:11px;
color:#94a3b8;
}

.admin-name{
font-weight:600;
color:white;
font-size:14px;
} 

/* Password Modal Styles */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 15px;
}

.modal-content {
    background: white;
    padding: 2rem;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    position: relative;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
}

.modal-content h3 { margin-top: 0; color: var(--sidebar); }

.modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.btn-save {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    flex: 1;
    cursor: pointer;
    font-weight: 600;
}

.btn-cancel {
    background: #e2e8f0;
    color: var(--secondary);
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
}

    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">
    <div class="admin-profile">
    <i class="fas fa-user-circle"></i>
    <div>
        <div class="admin-label">Logged in</div>
        <div class="admin-name" id="adminName"></div>
    </div>
</div>
    <h2><i class="fas fa-egg"></i> Bakafa Farm</h2>
    <a href="admin-dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="inventory.html" class="nav-link"><i class="fas fa-boxes-stacked"></i> View Inventory</a>
    <a href="sales-report.html" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Sales Report</a>
    <a href="inventory_report.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Inventory Report</a>
    <a href="admin-calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Delivery Calendar</a>
    <a href="production.html" class="nav-link"><i class="fas fa-plus-circle"></i> Add Production</a>
    <a href="production_report.html" class="nav-link"><i class="fas fa-file-contract"></i> Production Report</a>
    <a href="#" class="nav-link" onclick="openPasswordModal()">
    <i class="fas fa-key"></i>
    <span>Change Password</span>
</a>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</nav>

<div class="main-content">
    <header>
        <div class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">Delivery Schedule</h1>
            <p style="margin:0; color: var(--secondary); font-size: 0.85rem;">Pending & Out for Delivery</p>
        </div>
    </header>

    <div class="calendar-container">
        <div id="calendar"></div>
    </div>
</div>


 <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <h3>Update Password</h3>
            <div style="text-align: left;">
                <label style="font-size: 0.8rem; font-weight: 600;">New Password</label>
                <div class="search-wrapper" style="margin-top: 5px;">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Minimum 6 characters" style="padding-left: 35px;">
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closePasswordModal()">Cancel</button>
                <button class="btn-save" id="savePassBtn" onclick="updatePassword()">Update Password</button>
            </div>
        </div>
    </div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    const firebaseConfig = {
        apiKey: "AIzaSyABsyqTPCwlTuC7WLBmtXo7HgZjfxRHU7M",
        authDomain: "egg-inventory-system-10c0b.firebaseapp.com",
        databaseURL: "https://egg-inventory-system-10c0b-default-rtdb.firebaseio.com",
        projectId: "egg-inventory-system-10c0b",
        storageBucket: "egg-inventory-system-10c0b.appspot.com",
        messagingSenderId: "935350302045",
        appId: "1:935350302045:web:96ff5e551cdea5b120e4b4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listMonth'
            },
            height: 'auto',
            eventClick: function(info) {
                alert(`Customer: ${info.event.title}\nStatus: ${info.event.extendedProps.delivery_status}\nSize: ${info.event.extendedProps.size}`);
            }
        });

        calendar.render();

        // Responsive View Switch
        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                calendar.changeView('listMonth');
            } else {
                calendar.changeView('dayGridMonth');
            }
        });

        db.ref("reservation").on("value", snapshot => {
            const events = [];
            if(snapshot.exists()){
                const data = snapshot.val();
                for(const date in data){
                    for(const time in data[date]){
                        for(const uid in data[date][time]){
                            const r = data[date][time][uid];
                            if(r.status === "Approved" && r.delivery_status !== "Delivered") {
                                const rawDate = r.delivery_date || r.delivery_schedule || date;
                                events.push({
                                    title: `${r.name} (${r.trays} Trays)`,
                                    start: rawDate,
                                    backgroundColor: r.delivery_status === "Out for Delivery" ? "#a855f7" : "#4f46e5",
                                    borderColor: r.delivery_status === "Out for Delivery" ? "#a855f7" : "#4f46e5",
                                    allDay: true,
                                    extendedProps: {
                                        size: r.size,
                                        trays: r.trays,
                                        delivery_status: r.delivery_status || "Pending"
                                    }
                                });
                            }
                        }
                    }
                }
            }
            calendar.removeAllEvents();
            calendar.addEventSource(events);
        });
    });

    function logout() { firebase.auth().signOut().then(() => window.location = "admin.html"); }

function highlightMenu() {
    // 1. Kuhaon ang filename gikan sa URL (e.g. "inventory.html")
    const path = window.location.pathname;
    const page = path.split("/").pop() || "admin-dashboard.html"; // Default kung empty

    // 2. Pangitaon tanang links sa sidebar
    const menuLinks = document.querySelectorAll('.nav-link');
    
    menuLinks.forEach(link => {
        // 3. Kuhaon ang "href" sa link (e.g. "inventory.html")
        const href = link.getAttribute("href");
        
        // 4. I-check kung nag-match ang page sa link
        if (page === href) {
            link.classList.add("active");
        } else {
            link.classList.remove("active");
        }
    });
}

document.addEventListener("DOMContentLoaded", function(){

    highlightMenu();

    auth.onAuthStateChanged(user=>{
        if(!user){
            window.location="admin.html";
        }else{

            const uid = user.uid;

            // GET ADMIN NAME
            db.ref("user/"+uid).once("value").then(snapshot=>{
                if(snapshot.exists()){
                    const data = snapshot.val();
                    document.getElementById("adminName").innerText = data.name;
                }
            });

        }
    });

});
function openPasswordModal() {
    document.getElementById('passwordModal').style.display = 'flex';
}

function closePasswordModal() {
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('newPassword').value = '';
}

// Firebase Password Update Logic
async function updatePassword() {
    const newPass = document.getElementById('newPassword').value;
    const btn = document.getElementById('savePassBtn');
    const user = firebase.auth().currentUser;

    if (newPass.length < 6) {
        alert("Password must be at least 6 characters long.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Updating...";

    try {
        await user.updatePassword(newPass);
        alert("Password updated successfully!");
        closePasswordModal();
    } catch (error) {
        console.error(error);
        if (error.code === 'auth/requires-recent-login') {
            alert("Security measure: Please logout and log back in before changing your password.");
        } else {
            alert("Error: " + error.message);
        }
    } finally {
        btn.disabled = false;
        btn.innerText = "Update Password";
    }
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('passwordModal');
    if (event.target == modal) closePasswordModal();
}

</script>

</body>
</html>
