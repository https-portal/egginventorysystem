<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakafa | Create Admin</title>

    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link rel="icon" type="image/png" href="tag.png">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .icon-header {
            width: 60px;
            height: 60px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem;
        }

        h2 {
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        button:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .msg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .msg.success { background: #f0fdf4; color: var(--success); display: block; }
        .msg.error { background: #fef2f2; color: var(--error); display: block; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            display: none;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    
    <div class="icon-header">
        <i class="fas fa-user-plus"></i>
    </div>

    <h2>Create Admin</h2>
    <p class="subtitle">Add a new administrator to Bakafa</p>

    <div class="input-group">
        <label>Full Name</label>
        <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="Name">
        </div>
    </div>

    <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="admin@gmail.com">
        </div>
    </div>

    <div class="input-group">
        <label>Secure Password</label>
        <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Min. 6 characters">
        </div>
    </div>

    <button id="createBtn" onclick="createAdmin()">
        <span id="btnText">Create Account</span>
        <div class="spinner" id="loader"></div>
    </button>

    <div class="msg" id="msg"></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyABsyqTPCwlTuC7WLBmtXo7HgZjfxRHU7M",
      authDomain: "egg-inventory-system-10c0b.firebaseapp.com",
      databaseURL: "https://egg-inventory-system-10c0b-default-rtdb.firebaseio.com",
      projectId: "egg-inventory-system-10c0b",
      storageBucket: "egg-inventory-system-10c0b.appspot.com",
      messagingSenderId: "935350302045",
      appId: "1:935350302045:web:96ff5e551cdea5b120e4b4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function createAdmin(){
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");
        const btnText = document.getElementById("btnText");
        const loader = document.getElementById("loader");
        const createBtn = document.getElementById("createBtn");

        if(!name || !email || !password){
            showMsg("Please fill all fields", "error");
            return;
        }

        // Loading State
        createBtn.disabled = true;
        btnText.style.display = "none";
        loader.style.display = "block";

        auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
            const uid = userCredential.user.uid;
            return db.ref("user/" + uid).set({
                name: name,
                email: email,
                usertype: "admin"
            });
        })
        .then(() => {
            showMsg("Admin account created successfully!", "success");
            // Clear inputs
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        })
        .catch((error) => {
            showMsg(error.message, "error");
        })
        .finally(() => {
            createBtn.disabled = false;
            btnText.style.display = "block";
            loader.style.display = "none";
        });
    }

    function showMsg(text, type) {
        const msg = document.getElementById("msg");
        msg.innerHTML = text;
        msg.className = "msg " + type;
    }
</script>

</body>
</html>
