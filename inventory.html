<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggDash | View Inventory</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --sidebar: #1e293b;
            --card: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--background); margin: 0; display: flex; }

        /* --- Sidebar --- */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 2rem 1rem; display: flex; flex-direction: column; position: fixed; height: 100vh; box-sizing: border-box; z-index: 100; }
        .sidebar h2 { font-size: 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; color: #fbbf24; }
        .nav-link { padding: 12px 15px; color: #cbd5e1; text-decoration: none; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .logout-btn { margin-top: auto; background: #334155; border: none; color: #fca5a5; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* --- Main Content --- */
        .main-content { margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }
        header { margin-bottom: 2rem; }

        /* --- Inventory Grid --- */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .inventory-card { background: var(--card); border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); position: relative; border: 1px solid #e2e8f0; }
        .inventory-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); border-radius: 16px 16px 0 0; }
        .egg-name { font-size: 1.25rem; font-weight: 700; color: #1e293b; margin: 0 0 1rem 0; text-transform: capitalize; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; }
        .label { color: var(--secondary); font-size: 0.9rem; }
        .value { font-weight: 600; color: #1e293b; }
        .price-tag { color: var(--success); font-weight: 700; font-size: 1.1rem; }
        .badge { padding: 4px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; }
        .status-high { background: #dcfce7; color: #166534; }
        .status-low { background: #fef3c7; color: #92400e; }
        .status-out { background: #fee2e2; color: #991b1b; }

        .btn-group { display: flex; gap: 8px; margin-top: 1rem; }
        .edit-btn, .history-btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; flex: 1; }
        .edit-btn { background: #f1f5f9; color: var(--primary); }
        .edit-btn:hover { background: var(--primary); color: white; }
        .history-btn { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }
        .history-btn:hover { background: #4338ca; color: white; }

        /* --- Modal Styling --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 95%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .history-list { margin-top: 1rem; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .type-add { color: var(--success); font-weight: 600; }
        .type-sub { color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2><i class="fas fa-egg"></i>Bakaka Poultry Farm</h2>
    
    <a href="admin-dashboard.html" class="nav-link">
        <i class="fas fa-th-large"></i> Dashboard
    </a>

    <a href="inventory.html" class="nav-link active">
        <i class="fas fa-boxes-stacked"></i> View Inventory
    </a>

    <a href="sales-report.html" class="nav-link">
        <i class="fas fa-file-invoice-dollar"></i> Sales Report
    </a>
    
    <a href="admin-calendar.html" class="nav-link">
        <i class="fas fa-calendar-alt"></i> Delivery Calendar
    </a>
    
    <a href="production.html" class="nav-link">
        <i class="fas fa-plus-circle"></i> Add Production
    </a>
    
    <a href="admin-map.html" class="nav-link">
        <i class="fas fa-map-marked-alt"></i> Delivery Map
    </a>

    <a href="production_report.html" class="nav-link">
        <i class="fas fa-file-contract"></i> Production Report
    </a>
    
    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</nav>

<div class="main-content">
    <header>
        <h1>Inventory Management</h1>
        <p>Monitor stock levels, update pricing, and track history.</p>
    </header>
    <div class="inventory-grid" id="inventory-container"></div>
</div>

<div class="modal" id="historyModal">
    <div class="modal-content">
        <h3 id="historyTitle">Stock History</h3>
        <div id="history-container" class="history-list">
            </div>
        <button class="btn-cancel" onclick="closeHistory()" style="width: 100%; margin-top: 1rem; padding: 10px; border: none; border-radius: 6px; cursor: pointer;">Close</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABsyqTPCwlTuC7WLBmtXo7HgZjfxRHU7M",
        authDomain: "egg-inventory-system-10c0b.firebaseapp.com",
        databaseURL: "https://egg-inventory-system-10c0b-default-rtdb.firebaseio.com",
        projectId: "egg-inventory-system-10c0b",
        storageBucket: "egg-inventory-system-10c0b.appspot.com",
        messagingSenderId: "935350302045",
        appId: "1:935350302045:web:96ff5e551cdea5b120e4b4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadInventory() {
        const container = document.getElementById('inventory-container');
        db.ref("inventory").on("value", snapshot => {
            container.innerHTML = "";
            const inventory = snapshot.val();
            for (const key in inventory) {
                const item = inventory[key];
                const qty = item.quantity || 0;
                const price = item.price || 0;
                
                let statusClass = qty <= 0 ? "status-out" : (qty < 100 ? "status-low" : "status-high");
                let statusText = qty <= 0 ? "Out of Stock" : (qty < 100 ? "Low Stock" : "Good Stock");

                container.innerHTML += `
                    <div class="inventory-card">
                        <h2 class="egg-name">${key.replace('_', ' ')}</h2>
                        <div class="info-row"><span class="label">Current Stock:</span><span class="value">${qty} Pcs</span></div>
                        <div class="info-row"><span class="label">Price per Tray:</span><span class="price-tag">₱${price.toLocaleString()}</span></div>
                        <span class="badge ${statusClass}">${statusText}</span>
                        <div class="btn-group">
                            <button class="history-btn" onclick="viewHistory('${key}')"><i class="fas fa-history"></i> History</button>
                            <button class="edit-btn" onclick="alert('Update modal code here')"><i class="fas fa-edit"></i> Edit</button>
                        </div>
                    </div>`;
            }
        });
    }

    async function viewHistory(size) {
        const historyContainer = document.getElementById('history-container');
        const modal = document.getElementById('historyModal');
        document.getElementById('historyTitle').innerText = `${size.replace('_',' ').toUpperCase()} History`;
        historyContainer.innerHTML = "Loading...";
        modal.style.display = 'flex';

        let historyData = [];

        // 1. Get Production Logs (+)
        const prodSnap = await db.ref("production").once("value");
        if (prodSnap.exists()) {
            const data = prodSnap.val();
            for (const date in data) {
                if (data[date][size]) {
                    historyData.push({
                        date: date,
                        qty: data[date][size].quantity,
                        type: 'Production',
                        class: 'type-add',
                        prefix: '+'
                    });
                }
            }
        }

        // 2. Get Sales/Reservations Approved (-)
        const resSnap = await db.ref("reservation").once("value");
        if (resSnap.exists()) {
            const data = resSnap.val();
            for (const date in data) {
                for (const time in data[date]) {
                    for (const uid in data[date][time]) {
                        const r = data[date][time][uid];
                        if (r.status === "Approved" && r.size === size) {
                            // Imong logic: if Approved, nakuhaan og quantity * 24 (or multiplier)
                            const deducted = r.deducted_pieces || (r.trays * 24);
                            historyData.push({
                                date: date,
                                qty: deducted,
                                type: `Sold to ${r.name}`,
                                class: 'type-sub',
                                prefix: '-'
                            });
                        }
                    }
                }
            }
        }

        // Sort by date newest first
        historyData.sort((a, b) => new Date(b.date) - new Date(a.date));

        historyContainer.innerHTML = historyData.length > 0 ? "" : "No history found.";
        historyData.forEach(item => {
            historyContainer.innerHTML += `
                <div class="history-item">
                    <span><strong>${item.date}</strong><br><small>${item.type}</small></span>
                    <span class="${item.class}">${item.prefix}${item.qty} Pcs</span>
                </div>`;
        });
    }

    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }
    function logout() { firebase.auth().signOut().then(() => window.location = "admin.html"); }

    loadInventory();
</script>
</body>
</html>
