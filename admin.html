<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakafa | Admin Access</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            /* Gikuha ang colors gikan sa Welcome Page */
            --primary: #fbbf24; 
            --primary-dark: #d97706;
            --sidebar: #1e293b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevent scroll tungod sa background scale */
            position: relative;
            padding: 15px;
        }

        /* --- Fullscreen Background (Same sa Welcome Page) --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('logo.png');
            background-size: cover;
            background-position: center;
            filter: blur(4px);
            transform: scale(1.1);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95); /* Semi-transparent white */
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--sidebar);
            font-size: 2rem;
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.4);
        }

        h2 {
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.fa-envelope, 
        .input-wrapper i.fa-lock {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px; 
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s;
            background: #ffffff;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.15);
        }

        .toggle-pass {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 5px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--sidebar); /* Dark background for contrast */
            color: var(--primary); /* Yellow text */
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        button:active { 
            transform: scale(0.98);
        }

        .error-box {
            background: #fff1f2;
            color: var(--error);
            padding: 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 20px;
            display: none;
            border: 1px solid #fecdd3;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid var(--primary);
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="bg-container"></div>

<div class="login-card">
    <div class="brand-icon">
        <i class="fas fa-user-shield"></i>
    </div>

    <h2>Admin Portal</h2>
    <p class="subtitle">Bakafa Inventory System</p>

    <div class="input-group">
        <label>Administrator Email</label>
        <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="admin@bakafa.com" inputmode="email">
        </div>
    </div>

    <div class="input-group">
        <label>Security Password</label>
        <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••">
            <i class="fas fa-eye toggle-pass" onclick="togglePassword()" id="eye-icon"></i>
        </div>
    </div>

    <button id="loginBtn" onclick="login()">
        <span id="btnText">Verify & Access</span>
        <div class="spinner" id="loader"></div>
    </button>

    <div class="error-box" id="error"></div>

    <div class="footer">
        &copy; 2026 Bakafa Egg Inventory Solutions
    </div>
</div>

<script>
// Firebase Config & Logic (Nagpabilin ang imong original logic)
const firebaseConfig = {
  apiKey: "AIzaSyABsyqTPCwlTuC7WLBmtXo7HgZjfxRHU7M",
  authDomain: "egg-inventory-system-10c0b.firebaseapp.com",
  databaseURL: "https://egg-inventory-system-10c0b-default-rtdb.firebaseio.com",
  projectId: "egg-inventory-system-10c0b",
  storageBucket: "egg-inventory-system-10c0b.appspot.com",
  messagingSenderId: "935350302045",
  appId: "1:935350302045:web:96ff5e551cdea5b120e4b4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

function togglePassword(){
    const passInput = document.getElementById("password");
    const eyeIcon = document.getElementById("eye-icon");
    if(passInput.type === "password"){
        passInput.type = "text";
        eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        passInput.type = "password";
        eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("error");
    const btnText = document.getElementById("btnText");
    const loader = document.getElementById("loader");

    errorBox.style.display = "none";
    
    if(!email || !password){
        showError("Please enter both email and password.");
        return;
    }

    btnText.innerText = "Verifying...";
    loader.style.display = "block";

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
        const uid = userCredential.user.uid;
        return database.ref('user/' + uid).get();
    })
    .then((snapshot) => {
        if(snapshot.exists() && snapshot.val().usertype === "admin") {
            window.location = "admin-dashboard.html";
        } else {
            showError("Access Denied: Admin privileges required.");
            auth.signOut();
            resetButton();
        }
    })
    .catch((err) => {
        showError("Invalid administrator credentials.");
        resetButton();
    });
}

function showError(msg) {
    const errorBox = document.getElementById("error");
    errorBox.innerText = msg;
    errorBox.style.display = "block";
}

function resetButton() {
    document.getElementById("btnText").innerText = "Verify & Access";
    document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
